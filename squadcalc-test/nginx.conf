# SquadCalc local test server.
#
# Goal: run the real SquadCalc front-end against PRODUCTION map tiles/metadata,
# but feed it OUR heightmaps so we can see our exported elevation on the maps.
#
#   /img/maps/<map>/heightmap.json  -> our file in /heightmaps (fallback: prod)
#   everything else the app fetches -> proxied to https://squadcalc.app/api
#   the app itself (html/js/css)    -> served from the built /dist

server {
    listen 8080;
    server_name localhost;

    # Needed because the proxy_pass targets below use a variable (runtime DNS).
    resolver 1.1.1.1 8.8.8.8 ipv6=off;
    set $prod https://squadcalc.app;

    # 1. Our heightmaps win. If we don't have this map, fall back to production.
    location ~ ^/img/maps/[^/]+/heightmap\.json$ {
        root /heightmaps;            # -> /heightmaps/img/maps/<map>/heightmap.json
        default_type application/json;
        try_files $uri @prod;
    }

    # 2. All other API traffic (tiles, basemap, servers, weapons, layers, health).
    location ~ ^/(img|get|post|health) {
        proxy_pass $prod/api$request_uri;
        proxy_set_header Host squadcalc.app;
        proxy_ssl_server_name on;
    }

    # 3. The SquadCalc single-page app.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Fallback used by location 1 when we have no local file for that map.
    location @prod {
        proxy_pass $prod/api$request_uri;
        proxy_set_header Host squadcalc.app;
        proxy_ssl_server_name on;
    }
}
