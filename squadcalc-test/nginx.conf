# SquadCalc local test server.
#
# Goal: run the real SquadCalc front-end against PRODUCTION map tiles/metadata,
# but feed it OUR heightmaps so we can see our exported elevation on the maps.
#
#   /img/maps/<map>/heightmap.json  -> our file in /heightmaps (fallback: prod)
#   everything else the app fetches -> proxied to https://squadcalc.app/api
#   the app itself (html/js/css)    -> served from the built /dist

server {
    listen 8080;
    server_name localhost;

    # Needed because the proxy_pass targets below use a variable (runtime DNS).
    resolver 1.1.1.1 8.8.8.8 ipv6=off;
    set $prod https://squadcalc.app;

    # 1. Our heightmaps win. If we don't have this map, fall back to production.
    location ~ ^/img/maps/[^/]+/heightmap\.json$ {
        root /heightmaps;            # -> /heightmaps/img/maps/<map>/heightmap.json
        default_type application/json;
        try_files $uri @prod;
    }

    # 1a. R+B 8-bit PNG surface (dev branch reads this as heightmap.png and
    # decodes height = (255 + r - b) * scale[2]). Ours wins; fall back to
    # production for maps we have not staged.
    location ~ ^/img/maps/[^/]+/heightmap\.png$ {
        root /heightmaps;
        default_type image/png;
        try_files $uri @prod;
    }

    # 1b. Full-res 16-bit PNG surface + meta (range-fan HD sampler). These are
    # ours only — 404 (not production) when missing, the app falls back to the
    # 500 grid.
    location ~ ^/img/maps/[^/]+/(heightmap_hd\.png|hd_meta\.json)$ {
        root /heightmaps;
        try_files $uri =404;
    }

    # 1c. Static UI image assets (marker/weapon/vehicle icons, flags, units...)
    # ship inside the built SquadCalc site, NOT the API. The catch-all proxy
    # below would otherwise forward them to /api and 404. Only /img/maps/ holds
    # map data that comes from production. Keep this list in sync with
    # public/img/ subfolders.
    location ~ ^/img/(markers|icons|weapons|vehicles|vehicleSpawners|spawnGroup|units|flags|favicons|github)/ {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }

    # 2. All other API traffic (tiles, basemap, servers, weapons, layers, health).
    location ~ ^/(img|get|post|health) {
        proxy_pass $prod/api$request_uri;
        proxy_set_header Host squadcalc.app;
        proxy_ssl_server_name on;
    }

    # 3. The SquadCalc single-page app.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Fallback used by location 1 when we have no local file for that map.
    location @prod {
        proxy_pass $prod/api$request_uri;
        proxy_set_header Host squadcalc.app;
        proxy_ssl_server_name on;
    }
}
